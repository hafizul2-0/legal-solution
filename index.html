<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
    <title>Home | Legal Solution</title>
  </head>
  <body class="font-[poppins]">
    <header class="flex max-w-6xl mt-13 mx-auto justify-between items-center">
      <div class="logo">
        <img class="w-37 h-11" src="images/logo2.png" alt="Justice logo" />
      </div>
      <nav>
        <ul class="flex text-base text-[#707070] gap-8">
          <li class=""><a href="#">Home</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">Cases</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Contact Us</a></li>
        </ul>
      </nav>
      <div>
        <button
          class="bg-[#B68C5A] text-white text-lg py-6 px-5 rounded-lg hover:bg-[#B68C4B] cursor-pointer"
        >
          Free Consultation
        </button>
      </div>
    </header>
    <main class="max-w-6xl mx-auto mt-13">
      <!-- banner area -->
      <section class="bg-[url('images/banner.png')] rounded-lg">
        <div class="mx-auto text-center text-white py-25">
          <h3 class="text-7xl font-extrabold leading-21 font-[EB_Garamond]">
            We Provide Effective <br />
            Legal Solutions
          </h3>
          <p class="mt-6 w-2xl mx-auto">
            There are many variations of passages of Lorem Ipsum available, but
            the majority have suffered alteration in some form, by injected
            humour.
          </p>
          <form class="mt-8">
            <input
              class="bg-white text-gray-500 leading-4 p-5 rounded-lg w-[500px] mr-6"
              type="text"
              name=""
              id=""
              placeholder="Search your services"
            />
            <button
              class="bg-[#B68C4B] text-white text-lg py-4 px-10 rounded-lg"
            >
              Search
            </button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
